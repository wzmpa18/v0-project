workflows:
  android-apk:
    name: 国学传承 Android APK 构建
    max_build_duration: 30
    environment:
      vars:
        PACKAGE_NAME: "com.guoxuechuan.app"
      node: 20
      java: 17
    scripts:
      - name: 安装依赖
        script: |
          npm install
      - name: 构建前端资源
        script: |
          npm run build
          echo "=== 验证构建产物 ==="
          if [ -d "out" ]; then
            echo "out 目录存在"
            ls -la out/index.html
            echo "文件总数: $(find out -type f | wc -l)"
          else
            echo "错误: out 目录不存在"
            exit 1
          fi
      - name: 同步 Capacitor 资源
        script: |
          npx cap sync android
          echo "=== 验证 Android 资源同步 ==="
          if [ -d "android/app/src/main/assets/public" ]; then
            echo "资源已同步到 Android"
            ls android/app/src/main/assets/public/index.html
          else
            echo "警告: 检查资源同步路径"
          fi
      - name: 构建 APK
        script: |
          cd android
          ./gradlew assembleRelease
          echo "=== APK 构建完成 ==="
          ls -la app/build/outputs/apk/release/
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - noreply@yandao.vip
