workflows:
  release-android:
    name: Release Android
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      java: 21
      vars:
        JAVA_VERSION: "21.0.0"
        NODE_VERSION: 20.18.0
        PNPM_VERSION: 9.12.3
        # Android signing variables are expected to be provided in Codemagic UI or secret vars.
        # Required names:
        # MYAPP_UPLOAD_STORE_FILE
        # MYAPP_UPLOAD_STORE_PASSWORD
        # MYAPP_UPLOAD_KEY_ALIAS
        # MYAPP_UPLOAD_KEY_PASSWORD
    scripts:
      - name: Pre-build validation (reject localhost in config)
        script: |
          cd "$CM_BUILD_DIR"
          echo "=== Checking for localhost in capacitor config ==="
          if grep -q "localhost" capacitor.config.json 2>/dev/null; then
            echo "FATAL: capacitor.config.json contains 'localhost' - production builds must not use local dev addresses"
            grep -n "localhost" capacitor.config.json
            exit 1
          fi
          if grep -q "127.0.0.1" capacitor.config.json 2>/dev/null; then
            echo "FATAL: capacitor.config.json contains '127.0.0.1' - production builds must not use local dev addresses"
            exit 1
          fi
          echo "=== Checking MainActivity.java for localhost ==="
          if grep -q "localhost" android/app/src/main/java/com/getcapacitor/myapp/MainActivity.java 2>/dev/null; then
            echo "FATAL: MainActivity.java contains 'localhost' references"
            exit 1
          fi
          echo "Validation passed: no localhost references found in production config"
      - name: Setup pnpm
        script: |
          cd "$CM_BUILD_DIR"
          npx --yes pnpm@${PNPM_VERSION} --version
      - name: Ensure UTF-8 without BOM guidance
        script: |
          cd "$CM_BUILD_DIR"
          echo "Keep Gradle files encoded as UTF-8 without BOM"
      - name: Install dependencies
        script: |
          cd "$CM_BUILD_DIR"
          npx --yes pnpm@${PNPM_VERSION} install --frozen-lockfile
      - name: Build web app
        script: |
          cd "$CM_BUILD_DIR"
          npx --yes pnpm@${PNPM_VERSION} build
      - name: Sync Capacitor Android
        script: |
          cd "$CM_BUILD_DIR"
          npx --yes pnpm@${PNPM_VERSION} exec cap sync android
      - name: Build Android release APK
        script: |
          cd "$CM_BUILD_DIR/android"
          export JAVA_HOME=$(/usr/libexec/java_home -v 21)
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          javac -version
          if [ -f ./gradle/wrapper/gradle-wrapper.jar ]; then
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            gradle assembleRelease
          fi
      - name: Build Android release AAB
        script: |
          cd "$CM_BUILD_DIR/android"
          export JAVA_HOME=$(/usr/libexec/java_home -v 21)
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          javac -version
          if [ -f ./gradle/wrapper/gradle-wrapper.jar ]; then
            chmod +x gradlew
            ./gradlew bundleRelease
          else
            gradle bundleRelease
          fi
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

  release-ios:
    name: Release iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      java: 21
      vars:
        JAVA_VERSION: "21.0.0"
        NODE_VERSION: 20.18.0
        PNPM_VERSION: 9.12.3
    scripts:
      - name: Setup pnpm
        script: |
          cd "$CM_BUILD_DIR"
          npx --yes pnpm@${PNPM_VERSION} --version
      - name: Install dependencies
        script: |
          cd "$CM_BUILD_DIR"
          npx --yes pnpm@${PNPM_VERSION} install --frozen-lockfile
      - name: Build web app
        script: |
          cd "$CM_BUILD_DIR"
          npx --yes pnpm@${PNPM_VERSION} build
      - name: Sync Capacitor iOS
        script: |
          cd "$CM_BUILD_DIR"
          npx --yes pnpm@${PNPM_VERSION} exec cap sync ios
      - name: Build iOS archive
        script: |
          if [ -d ios/App ]; then
            cd ios/App
            xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -archivePath $CM_BUILD_DIR/App.xcarchive archive
          else
            echo "ios/App not found. Please create iOS shell by running: npx cap add ios"
            exit 1
          fi
    artifacts:
      - ios/App/build/**/*.ipa
      - /tmp/xcodebuild_logs/*.log
