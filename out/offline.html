<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a1a">
  <title>网络异常 - 国学综合</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Serif SC", serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      max-width: 360px;
      text-align: center;
    }
    .icon {
      font-size: 64px;
      color: #d4af37;
      margin-bottom: 24px;
    }
    .title {
      font-size: 22px;
      color: #ffffff;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .message {
      font-size: 14px;
      color: #999999;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .retry-btn {
      display: inline-block;
      padding: 12px 40px;
      background: #c8102e;
      color: #ffffff;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:active {
      opacity: 0.8;
    }
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container" id="errorView">
    <div class="icon">⚠</div>
    <div class="title">网络异常</div>
    <div class="message">
      无法连接到云端服务<br>
      请检查网络连接后重试
    </div>
    <button class="retry-btn" onclick="retry()">重试连接</button>
  </div>
  <div class="container loading" id="loadingView">
    <div class="spinner"></div>
    <div class="loading-text">正在重新连接...</div>
  </div>
  <script>
    var REMOTE_URL = 'https://yandao-1300262413.cos.ap-guangzhou.myqcloud.com/index.html';
    function retry() {
      document.getElementById('errorView').style.display = 'none';
      document.getElementById('loadingView').style.display = 'flex';
      setTimeout(function() {
        window.location.href = REMOTE_URL;
      }, 1500);
    }
  </script>
</body>
</html>
